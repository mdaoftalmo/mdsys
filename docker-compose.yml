# docker-compose.yml — Desenvolvimento
version: '3.9'

services:
  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    container_name: erp-mdv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_mdv
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_user -d erp_mdv']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ──
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: erp-mdv-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://erp_user:erp_pass@postgres:5432/erp_mdv?schema=public
    volumes:
      - ./apps/backend/src:/app/src
    command: npm run start:dev

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: erp-mdv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    volumes:
      - ./apps/frontend/src:/app/src
    command: npm run dev

volumes:
  pgdata:
