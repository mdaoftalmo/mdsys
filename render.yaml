# render.yaml — Render Blueprint (one-click deploy)
# Usage: New → Blueprint → Connect repo → Deploy
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: erp-mdv-db
    plan: starter
    databaseName: erp_mdv
    user: erp_user

services:
  # ── Backend (NestJS) ──
  - type: web
    name: erp-mdv-api
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: ./apps/backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-mdv-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BACKEND_CORS_ORIGIN
        value: https://erp-mdv-web.onrender.com
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "3001"
      - key: RUN_SEED
        value: "true"
      - key: ADMIN_DEFAULT_PASSWORD
        value: mdv@2026!

  # ── Frontend (Next.js) ──
  - type: web
    name: erp-mdv-web
    runtime: docker
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: ./apps/frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://erp-mdv-api.onrender.com
      - key: NODE_ENV
        value: production
